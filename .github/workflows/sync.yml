name: 自动同步

on:
  schedule:
    # 北京时间每天 03:00，GitHub Actions cron 使用 UTC 时间。
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: 同步与生成
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 准备 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 安装依赖
        run: python -m pip install pyyaml

      - name: 拉取官方安装脚本
        run: |
          mkdir -p upstream generated
          curl -fsSL https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh -o upstream/install.sh
          curl -fsSL https://raw.githubusercontent.com/MHSanaei/3x-ui/main/x-ui.sh -o upstream/x-ui.sh
          head -n 1 upstream/install.sh | grep -q '^#!.*bash'
          head -n 1 upstream/x-ui.sh | grep -q '^#!.*bash'
          echo "OFFICIAL_COMMIT=$(git ls-remote https://github.com/MHSanaei/3x-ui.git refs/heads/main | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: 生成中文安装脚本
        run: python scripts/translate.py

      - name: 验证中文安装脚本
        run: |
          bash -n upstream/install.sh
          bash -n upstream/x-ui.sh
          python scripts/validate.py --report /tmp/i18n-report.md

      - name: 更新同步时间
        run: python scripts/update_metadata.py
        env:
          I18N_REPORT_PATH: /tmp/i18n-report.md

      - name: 生成公开同步摘要
        run: |
          {
            echo "## 同步状态"
            awk '
              /^## / { count += 1 }
              count < 2 { print }
            ' generated/sync-status.md
            echo
            echo "## 翻译报告"
            cat /tmp/i18n-report.md
          } > /tmp/sync-pr-body.md
          awk '
            /^## / { count += 1 }
            count < 2 { print }
          ' generated/sync-status.md >> "$GITHUB_STEP_SUMMARY"

      - name: 发布同步时间到 README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/metadata.json generated/sync-status.md
          if ! git diff --cached --quiet; then
            git commit -m "更新同步时间"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: 确认生成过程可重复
        run: |
          cp generated/install-cn.sh /tmp/install-cn.sh
          cp generated/x-ui-cn.sh /tmp/x-ui-cn.sh
          python scripts/translate.py
          cmp /tmp/install-cn.sh generated/install-cn.sh
          cmp /tmp/x-ui-cn.sh generated/x-ui-cn.sh

      - name: 发布 latest 分支
        run: |
          rm -rf /tmp/3x-ui-cn-latest
          mkdir -p /tmp/3x-ui-cn-latest/generated
          cp generated/install-cn.sh /tmp/3x-ui-cn-latest/generated/install-cn.sh
          cp generated/x-ui-cn.sh /tmp/3x-ui-cn-latest/generated/x-ui-cn.sh
          cp generated/metadata.json /tmp/3x-ui-cn-latest/generated/metadata.json
          cp generated/sync-status.md /tmp/3x-ui-cn-latest/generated/sync-status.md

          cd /tmp/3x-ui-cn-latest
          git init
          git checkout -b latest

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add generated/install-cn.sh generated/x-ui-cn.sh generated/metadata.json generated/sync-status.md
          git commit -m "自动发布中文安装脚本"

          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin latest

      - name: 创建同步 PR
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            upstream/install.sh
            upstream/x-ui.sh
            generated/install-cn.sh
            generated/x-ui-cn.sh
            generated/metadata.json
            generated/sync-status.md
          commit-message: "同步官方安装脚本并生成中文版"
          branch: "auto/sync-upstream-install"
          delete-branch: true
          title: "同步官方安装脚本并生成中文版"
          body-path: /tmp/sync-pr-body.md
